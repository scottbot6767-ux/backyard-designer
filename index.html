<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Backyard Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #161a1c;
      --sidebar: #0f1314;
      --surface: #1c2224;
      --border: #242e32;
      --text: #aabec4;
      --muted: #3d5a62;
      --white: #dceef4;
      --accent: #3cc97a;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      touch-action: none;
    }

    /* ─── SIDEBAR (desktop) ─── */
    .sidebar {
      width: 200px;
      min-width: 200px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .sidebar-header {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
    }

    .sidebar-sub {
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .sidebar-section {
      padding: 0.75rem 0.875rem;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.54rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      background: none;
      border: 1px solid transparent;
      color: var(--text);
      cursor: pointer;
      font-family: 'Outfit', system-ui;
      font-size: 0.7rem;
      padding: 0.32rem 0.45rem;
      text-align: left;
      width: 100%;
      transition: background 0.1s, color 0.1s;
    }

    .tool-btn:hover, .tool-btn.active {
      background: var(--surface);
      color: var(--white);
      border-color: var(--border);
    }

    .swatch {
      width: 12px;
      height: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .obj-sz {
      font-size: 0.54rem;
      color: var(--muted);
      margin-left: auto;
    }

    .brush-row {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }

    .brush-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-family: 'Outfit', system-ui;
      font-size: 0.58rem;
      padding: 3px 0;
      flex: 1;
      transition: all 0.1s;
    }

    .brush-btn:hover { color: var(--white); border-color: var(--muted); }
    .brush-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(60,201,122,0.08); }

    .act-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-family: 'Outfit', system-ui;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 0.4rem;
      text-transform: uppercase;
      width: 100%;
      margin-bottom: 0.3rem;
      transition: all 0.1s;
    }

    .act-btn:hover { background: var(--surface); color: var(--white); border-color: var(--muted); }
    .act-btn.danger:hover { border-color: #c03030; color: #c03030; }

    /* ─── MAIN ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      height: 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 1.5rem;
      flex-shrink: 0;
    }

    .topbar-pill { font-size: 0.6rem; color: var(--muted); }
    .topbar-pill span { color: var(--text); }
    .topbar-hint { font-size: 0.58rem; color: var(--muted); margin-left: auto; font-style: italic; }

    .canvas-area {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #yard {
      display: block;
      cursor: crosshair;
      box-shadow: 0 6px 32px rgba(0,0,0,0.6);
      touch-action: none;
    }

    /* ─── MOBILE BOTTOM TOOLBAR ─── */
    .mobile-toolbar { display: none; }

    /* ─── MOBILE LAYOUT ─── */
    @media (max-width: 768px) {
      body { flex-direction: column; }

      .sidebar { display: none; }

      .topbar {
        height: 38px;
        padding: 0 0.75rem;
        gap: 1rem;
      }

      .canvas-area {
        flex: 1;
        padding: 0.5rem;
        align-items: flex-start;
        justify-content: center;
      }

      .mobile-toolbar {
        display: flex;
        flex-direction: column;
        background: var(--sidebar);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .mtabs {
        display: flex;
        border-bottom: 1px solid var(--border);
      }

      .mtab {
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--muted);
        cursor: pointer;
        font-family: 'Outfit', system-ui;
        font-size: 0.6rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        margin-bottom: -1px;
        padding: 0.55rem 1rem;
        text-transform: uppercase;
        transition: color 0.1s;
      }

      .mtab.active { color: var(--white); border-bottom-color: var(--accent); }

      .mtab-action {
        background: none;
        border: none;
        border-left: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        font-family: 'Outfit', system-ui;
        font-size: 0.58rem;
        letter-spacing: 0.1em;
        margin-left: auto;
        padding: 0.55rem 0.875rem;
        text-transform: uppercase;
      }

      .mtab-action:active { color: var(--white); background: var(--surface); }
      .mtab-action.danger:active { color: #c03030; }

      .mtool-panel {
        display: none;
        overflow-x: auto;
        scrollbar-width: none;
        padding: 0.5rem 0.5rem;
        gap: 0.4rem;
        flex-wrap: nowrap;
      }

      .mtool-panel::-webkit-scrollbar { display: none; }
      .mtool-panel.active { display: flex; }

      .mtool-chip {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        cursor: pointer;
        font-family: 'Outfit', system-ui;
        font-size: 0.65rem;
        padding: 0.35rem 0.65rem;
        white-space: nowrap;
        flex-shrink: 0;
        transition: background 0.1s, color 0.1s;
      }

      .mtool-chip.active {
        border-color: var(--accent);
        color: var(--white);
        background: rgba(60,201,122,0.12);
      }

      .mbrush-row {
        display: flex;
        gap: 0.35rem;
        padding: 0 0.5rem 0.5rem;
      }

      .mbrush-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        font-family: 'Outfit', system-ui;
        font-size: 0.6rem;
        padding: 4px 12px;
        flex: 1;
        transition: all 0.1s;
      }

      .mbrush-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(60,201,122,0.08); }
    }
  </style>
</head>
<body>

  <!-- DESKTOP SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Backyard Designer</div>
      <div class="sidebar-sub">50 ft wide · 25 ft deep</div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Ground Cover</div>
      <div id="paint-list"></div>
      <div class="brush-row">
        <button class="brush-btn active" onclick="setBrushD(this,1)">1 ft</button>
        <button class="brush-btn" onclick="setBrushD(this,3)">3 ft</button>
        <button class="brush-btn" onclick="setBrushD(this,5)">5 ft</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Objects</div>
      <div id="obj-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Actions</div>
      <button class="act-btn undo-btn" onclick="doUndo()" style="opacity:0.35;pointer-events:none">Undo</button>
      <button class="act-btn" onclick="doExport()">Export PNG</button>
      <button class="act-btn danger" onclick="doClear()">Clear All</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-pill">Mode: <span id="t-mode">Paint</span></div>
      <div class="topbar-pill">Tool: <span id="t-tool">Grass</span></div>
      <div class="topbar-pill" id="t-pos"></div>
      <div class="topbar-hint" id="t-hint">Click or drag to paint</div>
    </div>
    <div class="canvas-area">
      <canvas id="yard"></canvas>
    </div>

    <!-- MOBILE BOTTOM TOOLBAR -->
    <div class="mobile-toolbar">
      <div class="mtabs">
        <button class="mtab active" onclick="setMTab('ground',this)">Ground</button>
        <button class="mtab" onclick="setMTab('objects',this)">Objects</button>
        <button class="mtab-action undo-btn" onclick="doUndo()" style="opacity:0.35;pointer-events:none">Undo</button>
        <button class="mtab-action" onclick="doExport()">Export</button>
        <button class="mtab-action danger" onclick="doClear()">Clear</button>
      </div>
      <div class="mtool-panel active" id="mpanel-ground">
        <!-- filled by JS -->
      </div>
      <div class="mbrush-row" id="mbrush-row">
        <button class="mbrush-btn active" onclick="setBrushM(this,1)">1 ft</button>
        <button class="mbrush-btn" onclick="setBrushM(this,3)">3 ft</button>
        <button class="mbrush-btn" onclick="setBrushM(this,5)">5 ft</button>
      </div>
      <div class="mtool-panel" id="mpanel-objects">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <script>
  (function () {
    const W = 50, H = 25; // yard feet
    const HOUSE_H = 5;    // extra feet below yard for house visual

    const GROUND = {
      grass:    { label: 'Grass',       color: '#4a8c38', dark: '#388028' },
      mulch:    { label: 'Mulch',        color: '#6e4020', dark: '#542e14' },
      concrete: { label: 'Concrete',     color: '#8a9298', dark: '#6a7278' },
      patio:    { label: 'Patio Stone',  color: '#b4966a', dark: '#907850' },
      dirt:     { label: 'Bare Dirt',    color: '#9a7040', dark: '#7a5428' },
      gravel:   { label: 'Gravel',       color: '#7a8088', dark: '#5e646c' },
    };

    const OBJS = {
      trampoline:  { label: 'Trampoline',   w: 12, h: 12, shape: 'circle', color: '#282828', sz: '12ft' },
      swingset:    { label: 'Swing Set',    w: 14, h:  5, shape: 'rect',   color: '#7a5030', sz: '14×5ft' },
      sandbox:     { label: 'Sandbox',      w:  8, h:  8, shape: 'rect',   color: '#d4c060', sz: '8×8ft' },
      grill:       { label: 'Grill',        w:  3, h:  2, shape: 'rect',   color: '#1e1e1e', sz: '3×2ft' },
      patio:       { label: 'Patio',        w: 14, h: 10, shape: 'rect',   color: '#c0a070', sz: '14×10ft' },
      firepit:     { label: 'Fire Pit',     w:  5, h:  5, shape: 'circle', color: '#3e1a08', sz: '5ft' },
      shed:        { label: 'Shed',         w: 10, h:  8, shape: 'rect',   color: '#5a4030', sz: '10×8ft' },
      pool:        { label: 'Pool',         w: 18, h: 10, shape: 'rect',   color: '#3a88b8', sz: '18×10ft' },
      picnictable: { label: 'Picnic Table', w:  6, h:  3, shape: 'rect',   color: '#7a5830', sz: '6×3ft' },
      garden:      { label: 'Garden Bed',   w:  8, h:  4, shape: 'rect',   color: '#2e5820', sz: '8×4ft' },
      treelarge:   { label: 'Tree (Large)', w: 10, h: 10, shape: 'circle', color: '#1e5218', sz: '10ft' },
      treesmall:   { label: 'Tree (Small)', w:  6, h:  6, shape: 'circle', color: '#2a6e24', sz: '6ft' },
      shrub:       { label: 'Shrub',        w:  4, h:  4, shape: 'circle', color: '#3a7830', sz: '4ft' },
      verticalgarden: { label: 'Vert. Garden', w: 2, h: 6, shape: 'rect', color: '#2a5e1a', sz: '2×6ft' },
      steps:       { label: 'Steps',        w:  5, h:  3, shape: 'rect',   color: '#9a9ea8', sz: '5×3ft' },
    };

    // STATE
    let ground = Array.from({ length: H }, () => Array(W).fill('grass'));
    let placed = [];
    let activePaint = 'grass';
    let activeObjType = null;
    let brushSize = 1;
    let selected = null;
    let painting = false;
    let dragging = false;
    let history = [];
    const MAX_HISTORY = 40;
    let dragIdx = null;
    let dragOff = { x: 0, y: 0 };
    let hoverFt = { x: -1, y: -1 };
    let mouseOnCanvas = false;
    let SCALE = 16;

    const canvas = document.getElementById('yard');
    const ctx = canvas.getContext('2d');

    // ── DYNAMIC SCALING ──
    function calcScale() {
      const isMobile = window.innerWidth <= 768;
      const sidebarW = isMobile ? 0 : 200;
      const topbarH = 36;
      const bottomH = isMobile ? 130 : 0; // approx mobile toolbar height
      const padding = isMobile ? 16 : 32;
      const availW = window.innerWidth - sidebarW - padding;
      const availH = window.innerHeight - topbarH - bottomH - padding;
      const scaleW = Math.floor(availW / W);
      const scaleH = Math.floor(availH / (H + HOUSE_H));
      return Math.max(5, Math.min(scaleW, scaleH, 24));
    }

    function resizeCanvas() {
      SCALE = calcScale();
      canvas.width = W * SCALE;
      canvas.height = (H + HOUSE_H) * SCALE;
      render();
    }

    window.addEventListener('resize', resizeCanvas);

    // ── SIDEBAR BUILD ──
    const paintList = document.getElementById('paint-list');
    const mpanelGround = document.getElementById('mpanel-ground');
    Object.entries(GROUND).forEach(([key, g]) => {
      // Desktop
      const btn = document.createElement('button');
      btn.className = 'tool-btn' + (key === 'grass' ? ' active' : '');
      btn.id = 'pb-' + key;
      btn.innerHTML = `<div class="swatch" style="background:${g.color}"></div>${g.label}`;
      btn.onclick = () => pickPaint(key);
      paintList.appendChild(btn);
      // Mobile chip
      const chip = document.createElement('button');
      chip.className = 'mtool-chip' + (key === 'grass' ? ' active' : '');
      chip.id = 'mpb-' + key;
      chip.innerHTML = `<div class="swatch" style="background:${g.color}"></div>${g.label}`;
      chip.onclick = () => pickPaint(key);
      mpanelGround.appendChild(chip);
    });

    const objList = document.getElementById('obj-list');
    const mpanelObjects = document.getElementById('mpanel-objects');
    Object.entries(OBJS).forEach(([key, o]) => {
      // Desktop
      const btn = document.createElement('button');
      btn.className = 'tool-btn';
      btn.id = 'ob-' + key;
      btn.innerHTML = `<div class="swatch" style="background:${o.color}"></div>${o.label}<span class="obj-sz">${o.sz}</span>`;
      btn.onclick = () => pickObj(key);
      objList.appendChild(btn);
      // Mobile chip
      const chip = document.createElement('button');
      chip.className = 'mtool-chip';
      chip.id = 'mob-' + key;
      chip.innerHTML = `<div class="swatch" style="background:${o.color}"></div>${o.label}`;
      chip.onclick = () => pickObj(key);
      mpanelObjects.appendChild(chip);
    });

    // ── TOOL SELECTION ──
    function pickPaint(key) {
      activePaint = key; activeObjType = null; selected = null;
      document.querySelectorAll('.tool-btn, .mtool-chip').forEach(b => b.classList.remove('active'));
      document.getElementById('pb-' + key)?.classList.add('active');
      document.getElementById('mpb-' + key)?.classList.add('active');
      setInfo('Paint', GROUND[key].label, 'Drag to paint ground cover');
      canvas.style.cursor = 'crosshair';
      render();
    }

    window.pickObj = function (key) {
      activeObjType = key; activePaint = null; selected = null;
      document.querySelectorAll('.tool-btn, .mtool-chip').forEach(b => b.classList.remove('active'));
      document.getElementById('ob-' + key)?.classList.add('active');
      document.getElementById('mob-' + key)?.classList.add('active');
      setInfo('Place', OBJS[key].label, 'Tap to place · drag to move · Del to remove');
      canvas.style.cursor = 'crosshair';
      render();
    };

    window.setBrushD = function (el, s) {
      brushSize = s;
      document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    };

    window.setBrushM = function (el, s) {
      brushSize = s;
      document.querySelectorAll('.mbrush-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    };

    window.setMTab = function (tab, el) {
      document.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.querySelectorAll('.mtool-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('mpanel-' + tab).classList.add('active');
      document.getElementById('mbrush-row').style.display = tab === 'ground' ? 'flex' : 'none';
    };

    function setInfo(mode, tool, hint) {
      document.getElementById('t-mode').textContent = mode;
      document.getElementById('t-tool').textContent = tool;
      document.getElementById('t-hint').textContent = hint;
    }

    // ── HELPERS ──
    function canvasPos(clientX, clientY) {
      const r = canvas.getBoundingClientRect();
      return {
        x: (clientX - r.left) * (canvas.width / r.width),
        y: (clientY - r.top) * (canvas.height / r.height)
      };
    }

    function toFt(px) { return px / SCALE; }

    function getObjAt(fx, fy) {
      for (let i = placed.length - 1; i >= 0; i--) {
        const o = placed[i], d = OBJS[o.type];
        if (fx >= o.x && fx <= o.x + d.w && fy >= o.y && fy <= o.y + d.h) return i;
      }
      return -1;
    }

    function paintAt(fx, fy) {
      const half = Math.floor(brushSize / 2);
      const cx = Math.floor(fx), cy = Math.floor(fy);
      for (let dy = -half; dy <= half; dy++) {
        for (let dx = -half; dx <= half; dx++) {
          const gx = cx + dx, gy = cy + dy;
          if (gx >= 0 && gx < W && gy >= 0 && gy < H) ground[gy][gx] = activePaint;
        }
      }
    }

    function snapPlace(fx, fy, type) {
      const d = OBJS[type];
      return {
        x: Math.max(0, Math.min(W - d.w, Math.round(fx - d.w / 2))),
        y: Math.max(0, Math.min(H - d.h, Math.round(fy - d.h / 2)))
      };
    }

    // ── UNDO ──
    function saveState() {
      history.push({
        ground: ground.map(row => [...row]),
        placed: placed.map(o => ({ ...o }))
      });
      if (history.length > MAX_HISTORY) history.shift();
      updateUndoBtn();
    }

    function updateUndoBtn() {
      const hasHistory = history.length > 0;
      document.querySelectorAll('.undo-btn').forEach(b => {
        b.style.opacity = hasHistory ? '1' : '0.35';
        b.style.pointerEvents = hasHistory ? 'auto' : 'none';
      });
    }

    window.doUndo = function () {
      if (!history.length) return;
      const prev = history.pop();
      ground = prev.ground;
      placed = prev.placed;
      selected = null;
      updateUndoBtn();
      render();
    };

    // ── POINTER HANDLERS (shared mouse + touch) ──
    function onPointerDown(clientX, clientY) {
      const { x, y } = canvasPos(clientX, clientY);
      const fx = toFt(x), fy = toFt(y);
      hoverFt = { x: fx, y: fy };

      const idx = getObjAt(fx, fy);
      if (idx !== -1) {
        saveState(); // save before drag
        selected = idx; dragging = true; dragIdx = idx;
        dragOff = { x: fx - placed[idx].x, y: fy - placed[idx].y };
        canvas.style.cursor = 'grabbing';
        render(); return;
      }
      if (activeObjType) {
        saveState();
        const pos = snapPlace(fx, fy, activeObjType);
        placed.push({ type: activeObjType, x: pos.x, y: pos.y });
        selected = placed.length - 1;
        render(); return;
      }
      if (activePaint) {
        saveState(); // save at stroke start
        painting = true; selected = null;
        paintAt(fx, fy); render();
      }
    }

    function onPointerMove(clientX, clientY) {
      const { x, y } = canvasPos(clientX, clientY);
      const fx = toFt(x), fy = toFt(y);
      hoverFt = { x: fx, y: fy };

      const gx = Math.floor(fx), gy = Math.floor(fy);
      document.getElementById('t-pos').textContent =
        (gx >= 0 && gx < W && gy >= 0 && gy < H) ? `${gx},${gy} ft` : '';

      if (dragging && dragIdx !== null) {
        const d = OBJS[placed[dragIdx].type];
        placed[dragIdx].x = Math.max(0, Math.min(W - d.w, fx - dragOff.x));
        placed[dragIdx].y = Math.max(0, Math.min(H - d.h, fy - dragOff.y));
        render(); return;
      }
      if (painting && activePaint) { paintAt(fx, fy); render(); return; }
      if (mouseOnCanvas) {
        const hit = getObjAt(fx, fy);
        canvas.style.cursor = hit !== -1 ? 'grab' : 'crosshair';
        render();
      }
    }

    function onPointerUp() {
      if (dragging) { dragging = false; dragIdx = null; canvas.style.cursor = 'grab'; }
      painting = false;
    }

    // ── MOUSE EVENTS ──
    canvas.addEventListener('mouseenter', () => { mouseOnCanvas = true; });
    canvas.addEventListener('mouseleave', () => {
      mouseOnCanvas = false; hoverFt = { x: -1, y: -1 };
      painting = false;
      if (!dragging) render();
    });
    canvas.addEventListener('mousedown', e => { e.preventDefault(); onPointerDown(e.clientX, e.clientY); });
    document.addEventListener('mousemove', e => {
      if (!mouseOnCanvas && !dragging) return;
      onPointerMove(e.clientX, e.clientY);
    });
    document.addEventListener('mouseup', onPointerUp);

    // ── LONG PRESS (touch delete) ──
    let longPressTarget = null;
    let longPressStart = null;
    let longPressRAF = null;
    const LONG_PRESS_MS = 650;

    function startLongPress(idx) {
      clearLongPress();
      longPressTarget = idx;
      longPressStart = performance.now();
      selected = idx;
      animateLongPress();
    }

    function clearLongPress() {
      if (longPressRAF) { cancelAnimationFrame(longPressRAF); longPressRAF = null; }
      longPressTarget = null;
      longPressStart = null;
    }

    function animateLongPress() {
      if (longPressTarget === null) return;
      const progress = Math.min(1, (performance.now() - longPressStart) / LONG_PRESS_MS);
      render();
      if (progress < 1) {
        longPressRAF = requestAnimationFrame(animateLongPress);
      } else {
        if (navigator.vibrate) navigator.vibrate(40);
        saveState();
        placed.splice(longPressTarget, 1);
        clearLongPress();
        selected = null;
        render();
      }
    }

    // ── TOUCH EVENTS ──
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      const { x, y } = canvasPos(t.clientX, t.clientY);
      const fx = toFt(x), fy = toFt(y);
      const idx = getObjAt(fx, fy);
      if (idx !== -1 && !activeObjType) {
        startLongPress(idx); // long press to delete
      }
      onPointerDown(t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      clearLongPress(); // cancel long press if finger moves
      const t = e.touches[0];
      onPointerMove(t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      clearLongPress();
      onPointerUp();
    }, { passive: false });

    // ── KEYBOARD ──
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        activeObjType = null; selected = null;
        document.querySelectorAll('.tool-btn, .mtool-chip').forEach(b => b.classList.remove('active'));
        if (!activePaint) pickPaint('grass');
        render();
      }
      if ((e.key === 'Delete' || e.key === 'Backspace') && selected !== null
          && document.activeElement === document.body) {
        saveState();
        placed.splice(selected, 1); selected = null; render();
      }
      if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) {
        e.preventDefault(); doUndo();
      }
    });

    // ── RENDER ──
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Ground
      for (let gy = 0; gy < H; gy++) {
        for (let gx = 0; gx < W; gx++) {
          ctx.fillStyle = GROUND[ground[gy][gx]].color;
          ctx.fillRect(gx * SCALE, gy * SCALE, SCALE, SCALE);
        }
      }

      const yardH = H * SCALE;

      // Fine grid (yard only)
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 0.5;
      for (let gx = 0; gx <= W; gx++) {
        ctx.beginPath(); ctx.moveTo(gx * SCALE, 0); ctx.lineTo(gx * SCALE, yardH); ctx.stroke();
      }
      for (let gy = 0; gy <= H; gy++) {
        ctx.beginPath(); ctx.moveTo(0, gy * SCALE); ctx.lineTo(canvas.width, gy * SCALE); ctx.stroke();
      }

      // 5ft grid (yard only)
      ctx.strokeStyle = 'rgba(0,0,0,0.22)';
      ctx.lineWidth = 1;
      for (let gx = 0; gx <= W; gx += 5) {
        ctx.beginPath(); ctx.moveTo(gx * SCALE, 0); ctx.lineTo(gx * SCALE, yardH); ctx.stroke();
      }
      for (let gy = 0; gy <= H; gy += 5) {
        ctx.beginPath(); ctx.moveTo(0, gy * SCALE); ctx.lineTo(canvas.width, gy * SCALE); ctx.stroke();
      }

      // Rulers (only if scale big enough)
      if (SCALE >= 8) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.font = `${Math.max(7, SCALE * 0.55)}px system-ui`;
        ctx.textAlign = 'center';
        for (let gx = 5; gx <= W; gx += 5) ctx.fillText(gx + "'", gx * SCALE, 9);
        ctx.textAlign = 'left';
        for (let gy = 5; gy <= H; gy += 5) ctx.fillText(gy + "'", 2, gy * SCALE - 2);
      }

      // Paint brush preview
      if (activePaint && mouseOnCanvas && !dragging && hoverFt.x >= 0) {
        const half = Math.floor(brushSize / 2);
        const cx = Math.floor(hoverFt.x), cy = Math.floor(hoverFt.y);
        ctx.fillStyle = GROUND[activePaint].color + '90';
        ctx.strokeStyle = GROUND[activePaint].dark;
        ctx.lineWidth = 1;
        for (let dy = -half; dy <= half; dy++) {
          for (let dx = -half; dx <= half; dx++) {
            const gx = cx + dx, gy = cy + dy;
            if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
              ctx.fillRect(gx * SCALE, gy * SCALE, SCALE, SCALE);
              ctx.strokeRect(gx * SCALE + 0.5, gy * SCALE + 0.5, SCALE - 1, SCALE - 1);
            }
          }
        }
      }

      // Object ghost
      if (activeObjType && !dragging && hoverFt.x >= 0) {
        const pos = snapPlace(hoverFt.x, hoverFt.y, activeObjType);
        ctx.globalAlpha = 0.45;
        drawObj({ type: activeObjType, x: pos.x, y: pos.y }, false, -1);
        ctx.globalAlpha = 1;
      }

      // Placed objects
      placed.forEach((o, i) => drawObj(o, i === selected, i));

      // Fence (yard boundary only — 3 sides, open at bottom toward house)
      const fw = Math.max(2, SCALE * 0.25);
      ctx.strokeStyle = '#4a2e10';
      ctx.lineWidth = fw;
      ctx.beginPath();
      ctx.moveTo(1, yardH);          // bottom-left
      ctx.lineTo(1, 1);              // top-left
      ctx.lineTo(canvas.width - 1, 1);   // top-right
      ctx.lineTo(canvas.width - 1, yardH); // bottom-right
      ctx.stroke();

      // ── HOUSE ──
      const hy = yardH;
      const hh = HOUSE_H * SCALE;
      const hw = canvas.width;
      const ridge = hy + hh * 0.38;

      // Foundation / wall strip
      ctx.fillStyle = '#b0a898';
      ctx.fillRect(0, hy, hw, hh);

      // Roof panels (two slopes meeting at ridge)
      // Left slope shading
      ctx.fillStyle = '#9a9080';
      ctx.fillRect(0, hy, hw, ridge - hy);

      // Ridge line
      ctx.strokeStyle = '#6a6058';
      ctx.lineWidth = Math.max(2, SCALE * 0.2);
      ctx.beginPath(); ctx.moveTo(0, ridge); ctx.lineTo(hw, ridge); ctx.stroke();

      // Shingle lines (above ridge = closer slope, denser)
      ctx.strokeStyle = 'rgba(80,70,60,0.3)';
      ctx.lineWidth = 0.8;
      const shingleSpacing = Math.max(4, SCALE * 0.35);
      for (let sy = hy + shingleSpacing; sy < ridge; sy += shingleSpacing) {
        ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(hw, sy); ctx.stroke();
      }
      // Shingle lines below ridge (far slope, lighter)
      ctx.strokeStyle = 'rgba(60,50,40,0.18)';
      for (let sy = ridge + shingleSpacing; sy < hy + hh; sy += shingleSpacing) {
        ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(hw, sy); ctx.stroke();
      }

      // Vertical shingle dividers
      ctx.strokeStyle = 'rgba(80,70,60,0.15)';
      ctx.lineWidth = 0.5;
      for (let sx = SCALE * 2; sx < hw; sx += SCALE * 2) {
        ctx.beginPath(); ctx.moveTo(sx, hy); ctx.lineTo(sx, hy + hh); ctx.stroke();
      }

      // Chimney
      const chX = hw * 0.72, chW = SCALE * 2.5, chH = hh * 0.7;
      ctx.fillStyle = '#7a6050';
      ctx.fillRect(chX, hy, chW, chH);
      ctx.strokeStyle = '#5a4030'; ctx.lineWidth = 1;
      ctx.strokeRect(chX, hy, chW, chH);
      // Chimney cap
      ctx.fillStyle = '#5a4030';
      ctx.fillRect(chX - 2, hy, chW + 4, Math.max(3, SCALE * 0.2));

      // Back door / sliding glass door
      const doorW = SCALE * 5, doorH = hh * 0.72;
      const doorX = hw / 2 - doorW / 2;
      ctx.fillStyle = '#8aacb8';
      ctx.fillRect(doorX, hy, doorW, doorH);
      // Door frame
      ctx.strokeStyle = '#5a7888'; ctx.lineWidth = 1.5;
      ctx.strokeRect(doorX, hy, doorW, doorH);
      // Door center divider
      ctx.beginPath(); ctx.moveTo(doorX + doorW / 2, hy); ctx.lineTo(doorX + doorW / 2, hy + doorH); ctx.stroke();
      // Door handle
      ctx.fillStyle = '#c8a840';
      ctx.fillRect(doorX + doorW / 2 - 3, hy + doorH * 0.45, 6, 3);

      // Windows (left and right of door)
      [[hw * 0.18, SCALE * 3.5], [hw * 0.72 + SCALE * 3.5, SCALE * 3.5]].forEach(([wx, ww]) => {
        if (wx + ww < hw - SCALE) {
          const wh = hh * 0.5;
          ctx.fillStyle = '#8aacb8';
          ctx.fillRect(wx, hy + (hh - wh) * 0.1, ww, wh);
          ctx.strokeStyle = '#5a7888'; ctx.lineWidth = 1.5;
          ctx.strokeRect(wx, hy + (hh - wh) * 0.1, ww, wh);
          // Cross divider
          ctx.beginPath();
          ctx.moveTo(wx + ww / 2, hy + (hh - wh) * 0.1);
          ctx.lineTo(wx + ww / 2, hy + (hh - wh) * 0.1 + wh);
          ctx.moveTo(wx, hy + (hh - wh) * 0.1 + wh / 2);
          ctx.lineTo(wx + ww, hy + (hh - wh) * 0.1 + wh / 2);
          ctx.stroke();
        }
      });

      // "HOUSE" label
      const hFontSize = Math.max(9, Math.min(16, SCALE * 1.1));
      ctx.font = `600 ${hFontSize}px Outfit, system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(60,48,38,0.7)';
      ctx.fillText('HOUSE', hw / 2, hy + hh * 0.82);
      ctx.textBaseline = 'alphabetic';
    }

    // ── DRAW OBJECT ──
    function drawObj(o, sel, sel_idx) {
      const d = OBJS[o.type];
      const px = o.x * SCALE, py = o.y * SCALE;
      const pw = d.w * SCALE, ph = d.h * SCALE;

      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = Math.max(4, SCALE * 0.5);
      ctx.shadowOffsetY = 2;

      if (d.shape === 'circle') {
        const cx = px + pw / 2, cy = py + ph / 2;
        const r = Math.min(pw, ph) / 2 - 2;
        ctx.fillStyle = d.color;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowColor = 'transparent';

        if (o.type === 'trampoline') {
          ctx.strokeStyle = '#484848'; ctx.lineWidth = Math.max(1, SCALE * 0.15);
          ctx.beginPath(); ctx.arc(cx, cy, r - Math.max(3, SCALE * 0.3), 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = '#111';
          ctx.beginPath(); ctx.arc(cx, cy, r - Math.max(6, SCALE * 0.55), 0, Math.PI * 2); ctx.fill();
          if (SCALE > 8) {
            for (let a = 0; a < 360; a += 30) {
              const rad = a * Math.PI / 180;
              ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(cx + (r - SCALE * 0.55) * Math.cos(rad), cy + (r - SCALE * 0.55) * Math.sin(rad));
              ctx.lineTo(cx + r * Math.cos(rad), cy + r * Math.sin(rad));
              ctx.stroke();
            }
          }
        } else if (o.type === 'firepit') {
          ctx.strokeStyle = '#703010'; ctx.lineWidth = Math.max(2, SCALE * 0.2);
          ctx.beginPath(); ctx.arc(cx, cy, r - 2, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = '#c03808';
          ctx.beginPath(); ctx.arc(cx, cy, Math.max(3, r - SCALE * 0.7), 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#f08020';
          ctx.beginPath(); ctx.arc(cx, cy, Math.max(1, r - SCALE * 1.0), 0, Math.PI * 2); ctx.fill();
        }
      } else {
        ctx.fillStyle = d.color;
        ctx.fillRect(px, py, pw, ph);
        ctx.shadowColor = 'transparent';

        if (SCALE >= 8) {
          if (o.type === 'swingset') {
            ctx.strokeStyle = '#5a3818'; ctx.lineWidth = Math.max(1, SCALE * 0.15);
            ctx.beginPath();
            ctx.moveTo(px + SCALE * 0.6, py + 3);
            ctx.lineTo(px + pw - SCALE * 0.6, py + 3);
            ctx.stroke();
            [0.25, 0.5, 0.75].forEach(t => {
              const sx = px + pw * t;
              ctx.strokeStyle = '#8a6030'; ctx.lineWidth = 1;
              ctx.beginPath(); ctx.moveTo(sx - 4, py + 3); ctx.lineTo(sx - 4, py + ph - 6); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(sx + 4, py + 3); ctx.lineTo(sx + 4, py + ph - 6); ctx.stroke();
              ctx.fillStyle = '#7a4020';
              ctx.fillRect(sx - 6, py + ph - 8, 12, 4);
            });
          } else if (o.type === 'sandbox') {
            ctx.strokeStyle = '#9a6820'; ctx.lineWidth = Math.max(2, SCALE * 0.2);
            ctx.strokeRect(px + 2, py + 2, pw - 4, ph - 4);
            ctx.fillStyle = '#c8b048';
            ctx.fillRect(px + 4, py + 4, pw - 8, ph - 8);
          } else if (o.type === 'grill') {
            ctx.fillStyle = '#111'; ctx.fillRect(px + 3, py, pw - 6, ph * 0.65);
            ctx.strokeStyle = '#383838'; ctx.lineWidth = 1;
            [0.3, 0.6].forEach(t => {
              ctx.beginPath();
              ctx.moveTo(px + 4, py + ph * t * 0.65);
              ctx.lineTo(px + pw - 4, py + ph * t * 0.65);
              ctx.stroke();
            });
          } else if (o.type === 'patio') {
            ctx.strokeStyle = '#907050'; ctx.lineWidth = 1;
            const tW = SCALE * 3, tH = SCALE * 2.5;
            for (let tx = px; tx < px + pw; tx += tW) {
              ctx.beginPath(); ctx.moveTo(tx, py); ctx.lineTo(tx, py + ph); ctx.stroke();
            }
            for (let ty = py; ty < py + ph; ty += tH) {
              ctx.beginPath(); ctx.moveTo(px, ty); ctx.lineTo(px + pw, ty); ctx.stroke();
            }
          } else if (o.type === 'shed') {
            ctx.fillStyle = '#4a3428'; ctx.fillRect(px, py + ph * 0.28, pw, ph * 0.72);
            ctx.fillStyle = '#2e1e10';
            ctx.beginPath();
            ctx.moveTo(px - 3, py + ph * 0.3); ctx.lineTo(px + pw / 2, py + 2); ctx.lineTo(px + pw + 3, py + ph * 0.3);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#2a1a0c';
            ctx.fillRect(px + pw / 2 - 7, py + ph * 0.62, 14, ph * 0.38);
          } else if (o.type === 'pool') {
            ctx.fillStyle = '#3888c0'; ctx.fillRect(px + 3, py + 3, pw - 6, ph - 6);
            if (SCALE >= 10) {
              ctx.strokeStyle = '#60a8d8'; ctx.lineWidth = 1;
              for (let wy = py + 12; wy < py + ph - 5; wy += 12) {
                ctx.beginPath(); ctx.moveTo(px + 5, wy);
                for (let wx = px + 5; wx < px + pw - 5; wx += 16) {
                  ctx.quadraticCurveTo(wx + 8, wy - 4, wx + 16, wy);
                }
                ctx.stroke();
              }
            }
            ctx.strokeStyle = '#2068a0'; ctx.lineWidth = 3;
            ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
          } else if (o.type === 'picnictable') {
            ctx.fillStyle = '#6a4828'; ctx.fillRect(px + 4, py + ph * 0.28, pw - 8, ph * 0.44);
            ctx.fillStyle = '#7a5530';
            ctx.fillRect(px, py + ph * 0.08, pw, ph * 0.16);
            ctx.fillRect(px, py + ph * 0.76, pw, ph * 0.16);
          } else if (o.type === 'garden') {
            ctx.fillStyle = '#264818'; ctx.fillRect(px, py, pw, ph);
            ctx.fillStyle = '#50a030';
            const rows = Math.max(1, Math.floor(d.h * SCALE / 16));
            const cols = Math.max(1, Math.floor(d.w * SCALE / 16));
            for (let row = 0; row < rows; row++) {
              for (let col = 0; col < cols; col++) {
                ctx.beginPath();
                ctx.arc(px + (col + 0.5) * pw / cols, py + (row + 0.5) * ph / rows, Math.max(3, SCALE * 0.3), 0, Math.PI * 2);
                ctx.fill();
              }
            }
            ctx.strokeStyle = '#1e3810'; ctx.lineWidth = 1.5;
            ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
          } else if (o.type === 'steps') {
            // Steps shown as concentric rectangles (top-down elevation)
            const steps = 3;
            for (let s = 0; s < steps; s++) {
              const t = s / steps;
              const shade = Math.round(138 + s * 18);
              ctx.fillStyle = `rgb(${shade},${shade+4},${shade+8})`;
              ctx.fillRect(px + s * (pw / (steps * 2.5)), py + s * (ph / (steps * 2.2)),
                pw - s * (pw / (steps * 1.25)), ph - s * (ph / (steps * 1.1)));
            }
            ctx.strokeStyle = '#70747e'; ctx.lineWidth = 1;
            for (let s = 1; s < steps; s++) {
              ctx.beginPath();
              ctx.moveTo(px + s * (pw / (steps * 2.5)), py + s * (ph / (steps * 2.2)));
              ctx.lineTo(px + pw - s * (pw / (steps * 2.5)), py + s * (ph / (steps * 2.2)));
              ctx.stroke();
            }
          }
        }
      }

      // Trees and shrubs (circles drawn above)
      if (d.shape === 'circle' && (o.type === 'treelarge' || o.type === 'treesmall' || o.type === 'shrub')) {
        const cx = px + pw / 2, cy = py + ph / 2;
        const r = Math.min(pw, ph) / 2;
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = SCALE * 0.6; ctx.shadowOffsetY = 3;
        // Outer canopy shadow
        ctx.fillStyle = o.type === 'shrub' ? '#1e4a18' : '#143410';
        ctx.beginPath(); ctx.arc(cx + 2, cy + 3, r - 1, 0, Math.PI * 2); ctx.fill();
        ctx.shadowColor = 'transparent';
        // Main canopy layers
        const baseColor = o.type === 'treelarge' ? '#1e5218' : o.type === 'treesmall' ? '#2a6e24' : '#3a7830';
        const midColor  = o.type === 'treelarge' ? '#2a7030' : o.type === 'treesmall' ? '#3a8838' : '#4a9040';
        const topColor  = o.type === 'treelarge' ? '#3a8840' : o.type === 'treesmall' ? '#4a9848' : '#5aa850';
        ctx.fillStyle = baseColor;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
        // Mid layer — offset blobs for volume
        ctx.fillStyle = midColor;
        const blobR = r * 0.55;
        [[-blobR*0.4, -blobR*0.5], [blobR*0.5, -blobR*0.3], [-blobR*0.3, blobR*0.4], [blobR*0.2, blobR*0.5]].forEach(([bx, by]) => {
          ctx.beginPath(); ctx.arc(cx + bx, cy + by, blobR, 0, Math.PI * 2); ctx.fill();
        });
        // Highlight
        ctx.fillStyle = topColor;
        ctx.beginPath(); ctx.arc(cx - r * 0.2, cy - r * 0.2, r * 0.4, 0, Math.PI * 2); ctx.fill();
        // Trunk (small dot center)
        if (o.type !== 'shrub') {
          ctx.fillStyle = '#5a3010';
          ctx.beginPath(); ctx.arc(cx, cy, Math.max(2, SCALE * 0.12), 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
        // Skip normal label rendering, do it here
        const labelSize = Math.min(10, Math.max(6, pw / d.label.length * 1.0));
        if (labelSize >= 6) {
          ctx.font = `bold ${labelSize}px system-ui`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.shadowColor = 'rgba(0,0,0,1)'; ctx.shadowBlur = 4;
          ctx.fillText(d.label, cx, cy);
          ctx.shadowColor = 'transparent'; ctx.textBaseline = 'alphabetic';
        }
        // Selection ring
        if (sel) {
          ctx.strokeStyle = '#3cc97a'; ctx.lineWidth = 2;
          ctx.setLineDash([4, 3]);
          ctx.beginPath(); ctx.arc(cx, cy, r + 3, 0, Math.PI * 2); ctx.stroke();
          ctx.setLineDash([]);
          if (SCALE >= 8) {
            ctx.font = '8px system-ui'; ctx.textAlign = 'center';
            ctx.fillStyle = '#3cc97a';
            ctx.fillText('Delete', cx, py - 4);
          }
        }
        ctx.restore();
        return; // skip normal label/selection below
      }

      // Vertical garden — wall-mounted planter look
      if (o.type === 'verticalgarden') {
        // Frame
        ctx.fillStyle = '#3a2010'; ctx.fillRect(px, py, pw, ph);
        // Planting pockets in rows
        const pocketH = ph / 4;
        const pocketColors = ['#4a8830','#3a7820','#5a9838','#3a6820'];
        for (let row = 0; row < 4; row++) {
          ctx.fillStyle = pocketColors[row % pocketColors.length];
          ctx.fillRect(px + 2, py + row * pocketH + 2, pw - 4, pocketH - 4);
          // Foliage blob
          ctx.fillStyle = row % 2 === 0 ? '#60b040' : '#50a030';
          ctx.beginPath();
          ctx.ellipse(px + pw / 2, py + row * pocketH + pocketH * 0.45, pw / 2 - 3, pocketH * 0.35, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.strokeStyle = '#1e1008'; ctx.lineWidth = 1;
        ctx.strokeRect(px, py, pw, ph);
      }

      // Label
      const labelSize = Math.min(11, Math.max(6, pw / d.label.length * 1.1));
      if (labelSize >= 6) {
        ctx.font = `bold ${labelSize}px system-ui`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 3;
        ctx.fillText(d.label, px + pw / 2, py + ph / 2);
        ctx.shadowColor = 'transparent'; ctx.textBaseline = 'alphabetic';
      }

      // Long press progress ring
      if (longPressTarget === sel_idx && longPressStart !== null) {
        const progress = Math.min(1, (performance.now() - longPressStart) / LONG_PRESS_MS);
        const cx2 = px + pw / 2, cy2 = py + ph / 2;
        const ringR = Math.max(pw, ph) / 2 + 6;
        // Background ring
        ctx.strokeStyle = 'rgba(220,80,80,0.25)'; ctx.lineWidth = 3; ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(cx2, cy2, ringR, 0, Math.PI * 2); ctx.stroke();
        // Progress arc
        ctx.strokeStyle = '#e05050'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx2, cy2, ringR, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
        ctx.stroke();
      }

      // Selection
      if (sel) {
        ctx.strokeStyle = '#3cc97a'; ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]);
        if (d.shape === 'circle') {
          ctx.beginPath(); ctx.arc(px + pw / 2, py + ph / 2, Math.min(pw, ph) / 2 + 3, 0, Math.PI * 2); ctx.stroke();
        } else {
          ctx.strokeRect(px - 3, py - 3, pw + 6, ph + 6);
        }
        ctx.setLineDash([]);
        if (SCALE >= 8) {
          ctx.font = '8px system-ui'; ctx.textAlign = 'center';
          ctx.fillStyle = '#3cc97a';
          ctx.fillText('Delete', px + pw / 2, py - 4);
        }
      }

      ctx.restore();
    }

    // ── ACTIONS ──
    window.doExport = function () {
      const link = document.createElement('a');
      link.download = 'backyard.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    };

    window.doClear = function () {
      if (!confirm('Reset the entire yard?')) return;
      saveState();
      ground = Array.from({ length: H }, () => Array(W).fill('grass'));
      placed = []; selected = null; render();
    };

    // ── INIT ──
    resizeCanvas();
    pickPaint('grass');

  })();
  </script>
</body>
</html>
